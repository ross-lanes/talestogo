<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RobotRachel Apps Suite</title>
    <!-- Force rebuild -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Domain Redirect: tales.robotrachel.com -> apps.robotrachel.com -->
    <script>
      // Redirect tales.robotrachel.com to apps.robotrachel.com
      if (window.location.hostname === 'tales.robotrachel.com') {
        const newUrl = window.location.href.replace('tales.robotrachel.com', 'apps.robotrachel.com');
        window.location.replace(newUrl);
      }
    </script>

    <!-- Google Fonts - Montserrat and Roboto Condensed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800;900&family=Roboto:wght@400;700;900&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
