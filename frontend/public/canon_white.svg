<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Book/Document icon -->
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Open book shape -->
    <path d="M20 15 L20 55 Q40 50 50 55 L50 15 Q40 10 20 15" fill="white" fill-opacity="0.1"/>
    <path d="M50 15 L50 55 Q60 50 80 55 L80 15 Q60 10 50 15" fill="white" fill-opacity="0.1"/>
    <!-- Center spine -->
    <line x1="50" y1="15" x2="50" y2="55"/>
    <!-- Page lines on left -->
    <line x1="28" y1="25" x2="42" y2="23"/>
    <line x1="28" y1="33" x2="42" y2="31"/>
    <line x1="28" y1="41" x2="42" y2="39"/>
    <!-- Page lines on right -->
    <line x1="58" y1="23" x2="72" y2="25"/>
    <line x1="58" y1="31" x2="72" y2="33"/>
    <line x1="58" y1="39" x2="72" y2="41"/>
  </g>
  <!-- Canon text -->
  <text x="100" y="48" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="start">Canon</text>
