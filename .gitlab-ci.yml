# =============================================================================
# Tales GitLab CI/CD Pipeline (PPPL-Compliant)
# =============================================================================
# Automatically builds and pushes Docker images to the GitLab Container Registry.
#
# Uses Kaniko for building images (no privileged mode required).
#
# Tagging Strategy:
#   - Main branch: tagged as :latest
#   - Version tags (v1.0.0): tagged with version number
#   - Feature branches: tagged with branch name
# =============================================================================

stages:
  - build
  - deploy

build_container:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    # Determine image tag based on branch/tag
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        tag="latest"
      elif [ -n "$CI_COMMIT_TAG" ]; then
        tag="$CI_COMMIT_TAG"
      else
        tag="$CI_COMMIT_REF_SLUG"
      fi
    - echo "Building and pushing $CI_REGISTRY_IMAGE:$tag"
    # Create Docker config for registry authentication
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
    # Build and push with Kaniko
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$tag"
      --build-arg "VITE_API_URL=${VITE_API_URL:-}"
      --build-arg "VITE_MICROSOFT_CLIENT_ID=${VITE_MICROSOFT_CLIENT_ID:-}"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/cache"
  rules:
    # Run on any branch or tag
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

deploy_to_portainer:
  stage: deploy
  image: alpine:3.19
  script:
    - apk add --no-cache curl
    - echo "Triggering Portainer service update..."
    - 'curl -s -X POST "$PORTAINER_WEBHOOK_URL" || echo "Warning: Portainer webhook failed"'
    - echo "Deploy triggered successfully"
  rules:
    # Only deploy from main branch
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build_container
