# =============================================================================
# Tales Docker Compose Configuration for PPPL Production
# =============================================================================
#
# Deployment: tales.pppl.gov via Portainer
# GitLab: https://git.pppl.gov/rkremen/talestogo
# Portainer: https://portainer.pppl.gov/#!/7/docker/stacks/tales
#
# IMPORTANT: Set environment variables in Portainer's "Environment variables"
# section (below the YAML editor), NOT in this file!
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Tales Application
  # ---------------------------------------------------------------------------
  app:
    image: git.pppl.gov:5050/rkremen/talestogo:latest
    ports:
      - 8014:8000
    environment:
      # =======================================================================
      # Database Configuration
      # =======================================================================
      - DATABASE_URL=postgresql://tales:${DB_PASSWORD}@db:5432/tales

      # =======================================================================
      # Security - REQUIRED
      # =======================================================================
      # Set these in Portainer's Environment variables section:
      #   APP_SECRET=<generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32))">
      #   ENCRYPTION_KEY=<generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32))">
      #   DB_PASSWORD=<your-secure-db-password>
      - APP_SECRET=${APP_SECRET}
      - JWT_SECRET_KEY=${APP_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # =======================================================================
      # Authentication Configuration
      # =======================================================================
      # Enable/disable authentication methods
      - ENABLE_LOCAL_AUTH=${ENABLE_LOCAL_AUTH:-false}
      - ENABLE_MICROSOFT_AUTH=${ENABLE_MICROSOFT_AUTH:-true}
      - ENABLE_GOOGLE_AUTH=${ENABLE_GOOGLE_AUTH:-false}

      # Microsoft Entra ID / OIDC (PPPL Standard)
      # Set these in Portainer's Environment variables section:
      #   OIDC_CLIENT_ID=56a40ff6-b2c6-4bcc-a923-daaed2115486
      #   OIDC_CLIENT_SECRET=<your-azure-client-secret>
      #   OIDC_DISCOVERY_URL=https://login.microsoftonline.com/8cc02db7-c8da-4583-9e94-cd0ed18aae0f/v2.0/.well-known/openid-configuration
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-https://login.microsoftonline.com/8cc02db7-c8da-4583-9e94-cd0ed18aae0f/v2.0/.well-known/openid-configuration}

      # Legacy variable names (for backwards compatibility)
      - MICROSOFT_CLIENT_ID=${OIDC_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${OIDC_CLIENT_SECRET}

      # =======================================================================
      # PPPL Branding
      # =======================================================================
      - SITE_NAME=${SITE_NAME:-PPPL Tales}
      - SITE_LOGO_URL=${SITE_LOGO_URL:-https://www.pppl.gov/sites/default/files/pppl-logo.svg}
      - SITE_PRIMARY_COLOR=${SITE_PRIMARY_COLOR:-#003e60}
      - SITE_SECONDARY_COLOR=${SITE_SECONDARY_COLOR:-#75c9c8}

      # =======================================================================
      # LLM API Keys
      # =======================================================================
      # Optional: Can also configure via Admin UI after deployment
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}

      # =======================================================================
      # Application Settings
      # =======================================================================
      - FRONTEND_URL=https://tales.pppl.gov
      - ENVIRONMENT=production
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-true}

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=tales
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=tales
    volumes:
      - tales_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tales -d tales"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

# =============================================================================
# Networks
# =============================================================================
networks:
  app_network:
    driver: bridge

# =============================================================================
# Persistent Data Volumes
# =============================================================================
volumes:
  tales_postgres_data:
    # Database data persists across container restarts
    # Backup: docker compose exec db pg_dump -U tales tales > backup.sql
    # Restore: docker compose exec -T db psql -U tales tales < backup.sql
