# =============================================================================
# Tales Docker Compose Configuration (PPPL-Compliant)
# =============================================================================
#
# Quick Start:
#   1. Copy .env.template to .env and fill in your values
#   2. Run: docker compose up -d
#   3. Create admin: docker compose exec app python scripts/admin/setup_initial_admin.py
#   4. Access at: http://localhost:8080
#
# Documentation: See docs/IT_DEPLOYMENT_GUIDE.md
#
# PPPL Compliance:
#   - Uses environment variables for all secrets
#   - Supports OIDC_* (PPPL standard) and MICROSOFT_* (legacy) variable names
#   - Supports APP_SECRET (PPPL standard) and JWT_SECRET_KEY (legacy)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Tales Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Frontend build-time variables
        # Note: With new Login.tsx, auth config is fetched from backend at runtime
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      # Database (connects to the db service below)
      - DATABASE_URL=postgresql://tales:${DB_PASSWORD:-tales_password}@db:5432/tales

      # Security - PPPL naming with legacy fallback
      # APP_SECRET is PPPL standard, JWT_SECRET_KEY is legacy
      - APP_SECRET=${APP_SECRET:-${JWT_SECRET_KEY}}
      - JWT_SECRET_KEY=${APP_SECRET:-${JWT_SECRET_KEY}}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Authentication Enable/Disable Flags
      - ENABLE_LOCAL_AUTH=${ENABLE_LOCAL_AUTH:-true}
      - ENABLE_MICROSOFT_AUTH=${ENABLE_MICROSOFT_AUTH:-true}
      - ENABLE_GOOGLE_AUTH=${ENABLE_GOOGLE_AUTH:-false}

      # OIDC/OAuth - PPPL naming with legacy fallback
      # OIDC_* is PPPL standard, MICROSOFT_* is legacy
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-${MICROSOFT_CLIENT_ID:-}}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-${MICROSOFT_CLIENT_SECRET:-}}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration}
      # Legacy Microsoft variables (for backwards compatibility)
      - MICROSOFT_CLIENT_ID=${OIDC_CLIENT_ID:-${MICROSOFT_CLIENT_ID:-}}
      - MICROSOFT_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-${MICROSOFT_CLIENT_SECRET:-}}

      # Google OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}

      # Branding (lab-specific customization)
      - SITE_NAME=${SITE_NAME:-Tales}
      - SITE_LOGO_URL=${SITE_LOGO_URL:-}
      - SITE_PRIMARY_COLOR=${SITE_PRIMARY_COLOR:-#003e60}
      - SITE_SECONDARY_COLOR=${SITE_SECONDARY_COLOR:-#75c9c8}

      # LLM API Keys. At least one provider must be configured (see Admin → LLM
      # Providers in the UI). All are optional at the env-var level; the app
      # surfaces a clear error if nothing is configured.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      # Optional web-search providers (only needed if you want the State of the
      # LLMs report section AND aren't already using Gemini or Perplexity).
      - BING_SEARCH_V7_API_KEY=${BING_SEARCH_V7_API_KEY:-}
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT:-}
      - AZURE_AI_BING_CONNECTION_NAME=${AZURE_AI_BING_CONNECTION_NAME:-}
      # - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      # - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      # - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}

      # Email (optional - for sending user invitations)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-}

      # Application settings
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-true}
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=tales
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tales_password}
      - POSTGRES_DB=tales
    volumes:
      - tales_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tales -d tales"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network
    # Uncomment to expose database port for external access:
    # ports:
    #   - "5432:5432"

# =============================================================================
# Networks (PPPL Standard)
# =============================================================================
networks:
  app_network:
    driver: bridge

# =============================================================================
# Persistent Data Volumes
# =============================================================================
volumes:
  tales_postgres_data:
    # Database data persists here across container restarts
    # To backup: docker compose exec db pg_dump -U tales tales > backup.sql
    # To restore: docker compose exec -T db psql -U tales tales < backup.sql
